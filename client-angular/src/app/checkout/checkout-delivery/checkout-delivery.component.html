<div class="mt-4 mb-3" [formGroup]="checkoutForm">
  <div class="row" formGroupName="deliveryForm">
    <div class="col-6" *ngFor="let method of deliveryMethods">
      <input (click)="setShippingPrice(method)" type="radio" id="{{method.id}}" value="{{method.id}}" formControlName="deliveryMethod" class="form-check-input me-2">
      <label for="{{method}}" class="form-check-label">
        <strong>{{method.shortName}} - {{method.price | currency}}</strong>
        <br>
        <span class="label-description">{{method.description}}</span>
      </label>
    </div>
  </div>
</div>
<div class="float-none d-flex justify-content-between flex-column flex-lg-row mb-5">
  <button class="btn btn-outline-primary" cdkStepperPrevious>
    <i class="fa fa-angle-left"></i> Back to Adress
  </button>
  <button class="btn btn-primary" cdkStepperNext>
    Go to Review <i class="fa fa-angle-right"></i>
  </button>
</div>
