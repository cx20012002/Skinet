<ng-container *ngIf="items.length > 0">
  <table class="w-100">
    <thead [class.bg-light]="isBasket || isOrder">
    <tr>
      <th class="border-0" scope="col" >
        <div class="p-2 py-3 px-3 text-uppercase">Product</div>
      </th>
      <th class="border-0" scope="col" [class.bg-light]="isBasket">
        <div class="text-uppercase">Price</div>
      </th>
      <th class="border-0" scope="col" [class.bg-light]="isBasket">
        <div class="text-uppercase">Quantity</div>
      </th>
      <th class="border-0" scope="col" [class.bg-light]="isBasket">
        <div class="text-uppercase">Total</div>
      </th>
      <th *ngIf="isBasket" class="border-0 bg-light" scope="col">
        <div class="text-uppercase text-center">Remove</div>
      </th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let item of items">
      <th scope="row">
        <div class="py-4">
          <img src="{{item.pictureUrl}}" alt="{{item.productName}}" class="img-fluid" style="max-height: 50px;"/>
          <div class="ms-3 d-inline-block align-middle">
            <h5 class="mb-0">
              <a routerLink="/shop/{{item.id}}" class="text-dark text-decoration-none">{{item.productName}}</a>
            </h5>
            <span class="text-muted fw-normal fst-italic d-block">Type: {{item.type}}</span>
          </div>
        </div>
      </th>
      <td class="align-middle"><strong>{{item.price | currency}}</strong></td>
      <td class="align-middle">
        <div class="d-flex align-items-center" [class.justify-content-center]="!isBasket">
          <i *ngIf="isBasket" (click)="decrementItemQuantity(item)" class="fa fa-minus-circle text-warning me-2" style="cursor: pointer; font-size: 2em;"></i>
          <span class="fw-bold" style="font-size: 1.5em;">{{item.quantity}}</span>
          <i *ngIf="isBasket" (click)="incrementItemQuantity(item)" class="fa fa-plus-circle text-warning mx-2" style="cursor: pointer; font-size: 2em;"></i>
        </div>
      </td>
      <td class="align-middle "><strong>{{item.price * item.quantity | currency}}</strong></td>
      <td class="align-middle text-center"><i *ngIf="isBasket" (click)="removeBasketItem(item)" class="fa fa-trash text-danger" style="font-size: 2em; cursor: pointer;"></i></td>
    </tr>
    </tbody>
  </table>
</ng-container>
