<div class="container mt-5">
  <button (click)="get500Error()" class="btn btn-outline-primary me-3">Test 500 Errorr</button>
  <button (click)="get404Error()" class="btn btn-outline-primary me-3">Test 404 Errorr</button>
  <button (click)="get400Error()" class="btn btn-outline-primary me-3">Test 400 Errorr</button>
  <button (click)="get404ValidationError()" class="btn btn-outline-primary me-3">Test 400 Validation Errorr</button>
  <div class="row mt-5" *ngIf="validationErrors">
    <ul class="text-danger">
      <li *ngFor="let error of validationErrors">{{error}}</li>
    </ul>
  </div>
</div>
