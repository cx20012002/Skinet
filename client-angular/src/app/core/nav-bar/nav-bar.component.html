<div class="d-flex flex-column flex-md-row align-items-center justify-content-between p-3 mb-3 border-bottom shadow-sm fixed-top bg-light">
  <a href="/" class="d-flex align-items-center">
    <img src="/assets/images/logo.png" style="max-height: 70px" alt="logo" class="logo" routerLink="/">
  </a>
  <nav class="me-md-3 text-uppercase" style="font-size: large">
    <a class="me-3 py-2  text-decoration-none" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a class="me-3 py-2 text-decoration-none" routerLink="/shop" routerLinkActive="active">Shop</a>
    <a class="me-3 py-2 text-decoration-none" href="#">Contact</a>
  </nav>
  <div class="d-flex align-items-center">
    <a class="position-relative">
      <i class="fa fa-shopping-cart fa-2x me-5 text-dark"></i>
      <div class="cart-no">5</div>
    </a>
    <a class="btn btn-outline-primary me-2" href="#">Login</a>
    <a class="btn btn-outline-primary me-3" href="#">Sign up</a>
  </div>
</div>
